name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  APP_NAME: individual-recording

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"
          terraform_wrapper: false

      - name: Restore Terraform state
        uses: actions/cache@v4
        with:
          path: terraform/terraform.tfstate
          key: tfstate-${{ github.ref_name }}
          restore-keys: tfstate-

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Terraform Init
        run: terraform init

      - name: Terraform Apply (ECR only)
        run: terraform apply -auto-approve -target=aws_ecr_repository.api -target=aws_ecr_lifecycle_policy.api

      - name: Import existing resources if they exist
        run: |
          aws iam get-role --role-name ${{ env.APP_NAME }}-lambda-role > /dev/null 2>&1 && \
            terraform import aws_iam_role.lambda ${{ env.APP_NAME }}-lambda-role || \
            echo "IAM role does not exist yet, skipping"

          aws lambda get-function --function-name ${{ env.APP_NAME }} > /dev/null 2>&1 && \
            terraform import aws_lambda_function.api ${{ env.APP_NAME }} || \
            echo "Lambda function does not exist yet, skipping"

          API_ID=$(aws apigatewayv2 get-apis --query "Items[?Name=='${{ env.APP_NAME }}'].ApiId" --output text)
          if [ -n "$API_ID" ]; then
            terraform import aws_apigatewayv2_api.api $API_ID || echo "API Gateway already in state"
            terraform import aws_apigatewayv2_stage.default "$API_ID/\$default" || echo "Stage already in state"
            INTEGRATION_ID=$(aws apigatewayv2 get-integrations --api-id $API_ID --query 'Items[0].IntegrationId' --output text)
            [ -n "$INTEGRATION_ID" ] && terraform import aws_apigatewayv2_integration.lambda "$API_ID/$INTEGRATION_ID" || echo "Integration already in state"
          else
            echo "API Gateway does not exist yet, skipping"
          fi

      - name: Push placeholder image to ECR
        run: |
          ECR_URL=$(aws ecr describe-repositories \
            --repository-names ${{ env.APP_NAME }} \
            --query 'repositories[0].repositoryUri' \
            --output text)
          docker pull alpine:latest
          docker tag alpine:latest ${ECR_URL}:latest
          docker push ${ECR_URL}:latest

      - name: Terraform Apply (remaining resources)
        run: terraform apply -auto-approve

      - name: Save Terraform state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: terraform/terraform.tfstate
          key: tfstate-${{ github.ref_name }}-${{ github.run_id }}

  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    needs: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve ECR URL
        id: ecr
        run: |
          echo "url=$(aws ecr describe-repositories \
            --repository-names ${{ env.APP_NAME }} \
            --query 'repositories[0].repositoryUri' \
            --output text)" >> $GITHUB_OUTPUT

      - name: Build, Tag, and Push Image
        run: |
          docker build --platform linux/arm64 --provenance=false \
            -t ${{ steps.ecr.outputs.url }}:latest \
            -t ${{ steps.ecr.outputs.url }}:${{ github.sha }} \
            ./my-fastapi-app
          docker push ${{ steps.ecr.outputs.url }}:latest
          docker push ${{ steps.ecr.outputs.url }}:${{ github.sha }}

      - name: Update Lambda
        run: |
          aws lambda update-function-code \
            --function-name ${{ env.APP_NAME }} \
            --image-uri ${{ steps.ecr.outputs.url }}:latest

      - name: Wait for Lambda Update
        run: |
          aws lambda wait function-updated \
            --function-name ${{ env.APP_NAME }}
